<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <title>Script Generation → Candidate → Promotion Flow</title>
  <desc>Lifecycle of a script from Planner output through candidate review to script-library</desc>

  <rect width="900" height="580" fill="#0f1117"/>
  <text x="450" y="28" text-anchor="middle" fill="#e8eaf0" font-size="15" font-weight="bold">Script Lifecycle — Gen → Candidate → Promotion</text>

  <!-- PHASE LABELS -->
  <text x="130" y="54" text-anchor="middle" fill="#666" font-size="10" font-weight="bold">GENERATION</text>
  <text x="390" y="54" text-anchor="middle" fill="#666" font-size="10" font-weight="bold">CANDIDATE REVIEW</text>
  <text x="680" y="54" text-anchor="middle" fill="#666" font-size="10" font-weight="bold">SCRIPT LIBRARY</text>

  <!-- Phase dividers -->
  <line x1="260" y1="44" x2="260" y2="560" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="520" y1="44" x2="520" y2="560" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- ===== GENERATION PHASE ===== -->

  <rect x="30" y="64" width="200" height="44" rx="6" fill="#1a2a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="130" y="82" text-anchor="middle" fill="#4caf50" font-size="11" font-weight="bold">Planner</text>
  <text x="130" y="98" text-anchor="middle" fill="#aabbcc" font-size="10">gemma4:26b + RAG context</text>

  <line x1="130" y1="108" x2="130" y2="132" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="132" width="200" height="44" rx="6" fill="#1a1a2a" stroke="#9c6fe4" stroke-width="1.5"/>
  <text x="130" y="150" text-anchor="middle" fill="#9c6fe4" font-size="11" font-weight="bold">Auditor — AST Parse</text>
  <text x="130" y="165" text-anchor="middle" fill="#aabbcc" font-size="10">PS syntax check (hard gate)</text>

  <line x1="30" y1="154" x2="4" y2="154" stroke="#f44336" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="4" y="142" width="26" height="24" rx="3" fill="#1e1010" stroke="#f44336" stroke-width="1"/>
  <text x="17" y="158" text-anchor="middle" fill="#f44336" font-size="8">&#x2715;</text>

  <line x1="130" y1="176" x2="130" y2="200" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="200" width="200" height="44" rx="6" fill="#1a1a2a" stroke="#9c6fe4" stroke-width="1.5"/>
  <text x="130" y="218" text-anchor="middle" fill="#9c6fe4" font-size="11" font-weight="bold">Auditor — Cmdlet Check</text>
  <text x="130" y="233" text-anchor="middle" fill="#aabbcc" font-size="10">coverage ratio → Scorer signal</text>

  <line x1="130" y1="244" x2="130" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="268" width="200" height="44" rx="6" fill="#1a1a2a" stroke="#9c6fe4" stroke-width="1.5"/>
  <text x="130" y="286" text-anchor="middle" fill="#9c6fe4" font-size="11" font-weight="bold">Gate — Telegram</text>
  <text x="130" y="301" text-anchor="middle" fill="#aabbcc" font-size="10">Approve / Reject / Submit</text>

  <line x1="230" y1="290" x2="280" y2="290" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)"/>
  <text x="255" y="284" text-anchor="middle" fill="#ff9800" font-size="9">/submit</text>

  <line x1="130" y1="312" x2="130" y2="360" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="148" y="340" fill="#aabbcc" font-size="9">approve</text>

  <rect x="30" y="360" width="200" height="44" rx="6" fill="#1a2a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="130" y="378" text-anchor="middle" fill="#4caf50" font-size="11" font-weight="bold">Dispatcher</text>
  <text x="130" y="393" text-anchor="middle" fill="#aabbcc" font-size="10">execute + result to user</text>

  <!-- ===== CANDIDATE REVIEW PHASE ===== -->

  <rect x="280" y="200" width="200" height="44" rx="6" fill="#1e2130" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="380" y="218" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">~/curator-candidates/</text>
  <text x="380" y="233" text-anchor="middle" fill="#aabbcc" font-size="10">raw ps1 + task metadata</text>

  <line x1="380" y1="244" x2="380" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="280" y="268" width="200" height="54" rx="6" fill="#1e2130" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="380" y="286" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">Script Review</text>
  <text x="380" y="300" text-anchor="middle" fill="#aabbcc" font-size="10">runbooks/script-review.md</text>
  <text x="380" y="314" text-anchor="middle" fill="#aabbcc" font-size="10">7 criteria + revert gen</text>

  <line x1="380" y1="322" x2="380" y2="346" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="280" y="346" width="200" height="54" rx="6" fill="#1e2130" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="380" y="364" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">validate_candidate.py</text>
  <text x="380" y="378" text-anchor="middle" fill="#aabbcc" font-size="10">PSScriptAnalyzer</text>
  <text x="380" y="392" text-anchor="middle" fill="#aabbcc" font-size="10">Error = block, Warning = flag</text>

  <line x1="280" y1="370" x2="255" y2="370" stroke="#f44336" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="235" y="358" width="20" height="24" rx="3" fill="#1e1010" stroke="#f44336" stroke-width="1"/>
  <text x="245" y="374" text-anchor="middle" fill="#f44336" font-size="8">&#x2715;</text>

  <line x1="380" y1="400" x2="380" y2="424" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="280" y="424" width="200" height="44" rx="6" fill="#1a1a2a" stroke="#9c6fe4" stroke-width="1.5"/>
  <text x="380" y="442" text-anchor="middle" fill="#9c6fe4" font-size="11" font-weight="bold">Human Approval</text>
  <text x="380" y="457" text-anchor="middle" fill="#aabbcc" font-size="10">review session</text>

  <line x1="480" y1="446" x2="540" y2="446" stroke="#4caf50" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="510" y="440" text-anchor="middle" fill="#4caf50" font-size="9">promote</text>

  <!-- ===== SCRIPT LIBRARY PHASE ===== -->

  <rect x="540" y="420" width="200" height="54" rx="6" fill="#1a2a1a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="640" y="438" text-anchor="middle" fill="#4caf50" font-size="11" font-weight="bold">script-library/</text>
  <text x="640" y="452" text-anchor="middle" fill="#aabbcc" font-size="10">production.ps1</text>
  <text x="640" y="466" text-anchor="middle" fill="#aabbcc" font-size="10">metadata.json + revert</text>

  <line x1="640" y1="420" x2="640" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="540" y="296" width="200" height="44" rx="6" fill="#1e2130" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="640" y="314" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">scripts/curate.py</text>
  <text x="640" y="329" text-anchor="middle" fill="#aabbcc" font-size="10">Tier 1/2 corpus entries</text>

  <line x1="640" y1="296" x2="640" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="540" y="176" width="200" height="44" rx="6" fill="#1e2130" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="640" y="194" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">scripts/indexer.py</text>
  <text x="640" y="209" text-anchor="middle" fill="#aabbcc" font-size="10">→ Qdrant graph-ps</text>

  <text x="720" y="340" fill="#666" font-size="9">corpus</text>
  <text x="720" y="352" fill="#666" font-size="9">feedback</text>
  <text x="720" y="364" fill="#666" font-size="9">loop</text>

  <line x1="540" y1="198" x2="370" y2="198" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="370" y1="198" x2="370" y2="110" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="370" y1="110" x2="130" y2="110" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="450" y="192" text-anchor="middle" fill="#ff9800" font-size="9">Qdrant enriched → Scout scores higher</text>

  <rect x="540" y="64" width="200" height="80" rx="6" fill="#161820" stroke="#2a2d3a" stroke-width="1"/>
  <text x="640" y="82" text-anchor="middle" fill="#e8eaf0" font-size="11" font-weight="bold">metadata.json</text>
  <text x="640" y="98" text-anchor="middle" fill="#aabbcc" font-size="10">intent, cmdlets, scope</text>
  <text x="640" y="112" text-anchor="middle" fill="#aabbcc" font-size="10">risk_level, author</text>
  <text x="640" y="126" text-anchor="middle" fill="#aabbcc" font-size="10">revert: ps1 or not_applicable</text>

  <rect x="280" y="64" width="200" height="108" rx="6" fill="#161820" stroke="#2a2d3a" stroke-width="1"/>
  <text x="380" y="82" text-anchor="middle" fill="#e8eaf0" font-size="11" font-weight="bold">Review Criteria</text>
  <text x="295" y="98" fill="#aabbcc" font-size="9">1. Correctness</text>
  <text x="295" y="111" fill="#aabbcc" font-size="9">2. Safety (no destructive ops)</text>
  <text x="295" y="124" fill="#aabbcc" font-size="9">3. Error handling</text>
  <text x="295" y="137" fill="#aabbcc" font-size="9">4. Output (structured)</text>
  <text x="295" y="150" fill="#aabbcc" font-size="9">5. Idempotency</text>
  <text x="295" y="163" fill="#aabbcc" font-size="9">6. Consolidation check</text>
  <text x="470" y="98" fill="#aabbcc" font-size="9">7. Revert gen</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
